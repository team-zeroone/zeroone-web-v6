name: New Portfolio Project
description: Submit a new project to the portfolio using the Agentic Workflow.
labels: ["portfolio"]
body:
  - type: markdown
    attributes:
      value: |
        If you're unsure how this works, see the <a href="https://github.com/team-zeroone/zeroone-web-v6#readme" target="_blank">Portfolio Manager Guide</a>.
  - type: dropdown
    id: type
    attributes:
      label: Project Type
      options:
        - Tech
        - Design
    validations:
      required: true
  - type: textarea
    id: thumbnail
    attributes:
      label: Thumbnail (Grid Image - Drag & Drop or URL)
      placeholder: "Drag an image here or paste a direct URL"
    validations:
      required: false
  - type: textarea
    id: hero_image
    attributes:
      label: Hero Image (Optional - Drag & Drop or URL)
      placeholder: "Used at the top of the project page. If blank, the thumbnail will be used."
    validations:
      required: false
  - type: textarea
    id: details
    attributes:
      label: Full Details (Brain Dump)
      placeholder: Paste your rough notes, features, and everything Gemini should know.
    validations:
      required: true
  - type: input
    id: stack
    attributes:
      label: Tech Stack
      placeholder: e.g. React, Node.js, AWS
    validations:
      required: true
  - type: input
    id: source_url
    attributes:
      label: Source URL (GitHub / Figma)
      placeholder: https://github.com/ or https://figma.com/
    validations:
      required: false
  - type: input
    id: live_url
    attributes:
      label: Live Website URL
      placeholder: https://...
    validations:
      required: false
