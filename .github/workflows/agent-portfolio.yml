name: Agent Portfolio Sync

on:
  issues:
    types: [opened, edited]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'The issue number to process'
        required: true


jobs:
  generate-portfolio:
    if: |
      github.event_name == 'workflow_dispatch' || 
      contains(github.event.issue.labels.*.name, 'portfolio')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Process Portfolio Issue
        id: agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.inputs.issue_number || github.event.issue.number }}
        run: node scripts/process-portfolio.js

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "${{ steps.agent.outputs.action_slug }}(portfolio): ${{ steps.agent.outputs.project_title }}"
          branch: "portfolio/${{ steps.agent.outputs.action_slug }}-${{ steps.agent.outputs.slug }}"
          title: "[${{ steps.agent.outputs.action_label }} Portfolio]: ${{ steps.agent.outputs.project_title }}"
          body: |
            This PR was automatically generated by the Portfolio Agent in response to Issue #${{ steps.agent.outputs.issue_number }}.
            
            ### Project Details
            - **Action:** ${{ steps.agent.outputs.action_label }}
            - **Title:** ${{ steps.agent.outputs.project_title }}
            - **Slug:** ${{ steps.agent.outputs.slug }}
            
            Please review the generated content and merge if correct.
          labels: |
            portfolio
            automated-pr
          delete-branch: true

      - name: Add Comment to Issue
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ steps.agent.outputs.issue_number }}
          body: |
            🚀 **Agent Task Complete!**
            
            I have processed your submission and created a Pull Request with the structured Markdown content.
            
            Please review the changes here: [Check Pull Requests](${{ github.server_url }}/${{ github.repository }}/pulls)

      - name: Notify Failure
        if: failure()
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.inputs.issue_number || github.event.issue.number }}
          body: |
            ❌ **Agent Task Failed!**
            
            Something went wrong while processing your portfolio entry. This usually happens if the AI service is overloaded or if there is a connection issue.
            
            Review the logs here for details: [View Error Logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
