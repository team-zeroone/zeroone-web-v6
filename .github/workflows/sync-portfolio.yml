name: WordPress Sync
on:
  push:
    branches:
      - main
    paths:
      - 'content/portfolio/**'
  workflow_dispatch:
    inputs:
      force_delete:
        description: 'Space-separated list of slugs to force delete (e.g. studyq coachello)'
        required: false
        type: string

jobs:
  sync-to-wp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: content/portfolio/*.md

      - name: Setup Node.js
        if: steps.changed-files.outputs.any_changed == 'true' || steps.changed-files.outputs.deleted_files != '' || github.event.inputs.force_delete != ''
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Dependencies
        if: steps.changed-files.outputs.any_changed == 'true' || steps.changed-files.outputs.deleted_files != '' || github.event.inputs.force_delete != ''
        run: npm install

      - name: Sync to WordPress
        if: steps.changed-files.outputs.any_changed == 'true' || steps.changed-files.outputs.deleted_files != '' || github.event.inputs.force_delete != ''
        env:
          WP_API_URL: ${{ secrets.WP_API_URL }}
          WP_USERNAME: ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DELETED_FILES: ${{ steps.changed-files.outputs.deleted_files }} ${{ github.event.inputs.force_delete }}
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          node scripts/sync-wordpress.js
